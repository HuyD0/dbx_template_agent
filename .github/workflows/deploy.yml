# Deploy + (optionally) run the eval gate — MANUAL DISPATCH ONLY.
#
# This workflow spends real Databricks compute and judge tokens, so it never
# auto-triggers from a push or PR. A human clicks "Run workflow" (or CI calls
# it deliberately as a promotion step).
#
# Auth is KEYLESS (OIDC workload identity federation): GitHub mints a
# short-lived id token per run (`id-token: write`), and a federation policy on
# the `github-dbx-template-agent` service principal trusts it for this repo's
# `production` environment. No DATABRICKS_TOKEN secret exists to rotate or
# leak. One-time setup: scripts/setup_github_oidc.sh.
name: deploy

on:
  workflow_dispatch:
    inputs:
      run_eval_gate:
        description: "Also run the eval gate job after deploying"
        type: boolean
        default: true

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write # mint the GitHub OIDC token the federation policy trusts
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # must match the federation policy's subject claim
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Bundle deploy
        run: databricks bundle deploy

      - name: Run eval gate
        if: ${{ inputs.run_eval_gate }}
        # The gate is the only job in this bundle; resolve its key from the
        # bundle itself so this workflow needs no per-project editing.
        run: |
          JOB_KEY=$(databricks bundle summary -o json | jq -r '.resources.jobs | keys[0]')
          databricks bundle run "$JOB_KEY"
