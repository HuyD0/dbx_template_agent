# Secret scanning — a defense-in-depth backstop over .gitignore.
#
# .gitignore keeps .env and friends out of the tree, but that only works if every
# contributor's ignore rules are correct and nobody force-adds. gitleaks scans the
# actual diff/history for credential patterns (API keys, tokens, private keys) so a
# leak is caught at the PR boundary instead of after it's public. The default path
# in this repo needs NO committed secrets (Databricks profile / OIDC), so a
# committed credential is always a mistake worth blocking on.
name: secret-scan

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# gitleaks-action lists the PR's commits to scope its scan; with the default
# read-only GITHUB_TOKEN that call 403s ("Resource not accessible by
# integration"), so grant the two read scopes it needs explicitly.
permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers the whole PR range
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
