# OPTIONAL: a Model Serving endpoint for your agent.
#
# This whole resource ships commented out on purpose: a serving endpoint needs a
# registered model VERSION to exist first, and on a fresh project there isn't one
# yet. Notebook 06 registers the agent into Unity Catalog as
# ${var.catalog}.${var.schema}.dbx_template_agent_model and moves the @champion alias.
# After that has happened at least once, uncomment below and `databricks bundle deploy`.
#
# Why alias, not version number: the alias always points at whatever last passed
# the eval gate, so this file never needs editing when a new version is promoted.

